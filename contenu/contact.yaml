seo:
  titre: "Contact"
  description: "Contactez Fabien Lacombe (Pacivis Academy) pour un projet de formation à la prévention et à la gestion des conflits : premier échange sans engagement, proposition sur mesure."

entete:
  surtitre: "Contact"
  titre: "Parlons de votre contexte."
  texte: "Chaque demande reçoit une réponse. Décrivez simplement votre situation : inutile d'avoir déjà un cahier des charges."

etapes:
  - titre: "Un premier échange"
    texte: "Vous décrivez vos équipes, vos situations réelles et vos contraintes. Sans engagement."
  - titre: "Une analyse du besoin"
    texte: "Fabien identifie les risques, les priorités et le dosage des quatre piliers adapté à votre contexte."
  - titre: "Une proposition sur mesure"
    texte: "Programme, durée, format (présentiel ou distanciel) et modalités pratiques, noir sur blanc."

contact_direct:
  texte: "Vous préférez un contact direct ?"
  lien: "Écrivez à Fabien sur LinkedIn."

